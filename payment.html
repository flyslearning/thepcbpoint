<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Pay Fees | The PCB Point</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{

min-height:100vh;

display:flex;
justify-content:center;
align-items:center;

padding:20px;

background:linear-gradient(-45deg,#2563eb,#4f46e5,#0ea5e9,#10b981);
background-size:400% 400%;
animation:bg 15s infinite ease;

}

@keyframes bg{

0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}

}

.card{

width:100%;
max-width:470px;

background:rgba(255,255,255,.15);

backdrop-filter:blur(22px);

border:1px solid rgba(255,255,255,.25);

border-radius:30px;

padding:35px;

box-shadow:0 25px 60px rgba(0,0,0,.25);

animation:fade .8s ease;

}

@keyframes fade{

from{

opacity:0;
transform:translateY(30px);

}

to{

opacity:1;
transform:none;

}

}

.logo{

width:90px;
height:90px;

margin:auto;

border-radius:50%;

background:white;

display:flex;
justify-content:center;
align-items:center;

font-size:42px;

box-shadow:0 12px 30px rgba(0,0,0,.18);

margin-bottom:20px;

}

h2{

color:white;
text-align:center;
font-weight:700;

}

.subtitle{

text-align:center;
color:#e2e8f0;

margin-bottom:30px;

font-size:14px;

}

.amount-box{

background:rgba(255,255,255,.12);

border-radius:20px;

padding:20px;

text-align:center;

margin-bottom:25px;

}

.amount-label{

color:#dbeafe;

font-size:14px;

}

.amount{

font-size:42px;

font-weight:800;

color:#22c55e;

margin-top:5px;

}

.row{

display:flex;

justify-content:space-between;

gap:20px;

padding:16px 0;

border-bottom:1px solid rgba(255,255,255,.12);

}

.label{

color:#dbeafe;

font-size:14px;

}

.value{

color:white;

font-weight:600;

text-align:right;

word-break:break-word;

}

.upi-box{

margin-top:20px;

display:flex;

gap:10px;

}

.upi-box input{

flex:1;

padding:14px;

border:none;

border-radius:12px;

background:rgba(255,255,255,.12);

color:white;

outline:none;

font-weight:600;

}

.upi-box button{

width:auto;

padding:14px 18px;

margin:0;

border:none;

border-radius:12px;

background:#2563eb;

color:white;

cursor:pointer;

font-weight:600;

}

.qr{

margin:25px auto;

display:flex;
justify-content:center;

}

.qr img{

width:190px;

border-radius:15px;

background:white;

padding:10px;

}

.pay-btn{

margin-top:15px;

width:100%;

padding:18px;

border:none;

border-radius:18px;

font-size:18px;

font-weight:700;

cursor:pointer;

color:white;

background:linear-gradient(135deg,#16a34a,#22c55e);

box-shadow:0 15px 35px rgba(34,197,94,.4);

transition:.3s;

}

.pay-btn:hover{

transform:translateY(-3px);

}

.footer{

margin-top:20px;

text-align:center;

color:#f1f5f9;

font-size:13px;

}

#error{

display:none;

color:white;

font-size:26px;

font-weight:700;

text-align:center;

}

@media(max-width:500px){

.card{

padding:25px;

}

.amount{

font-size:34px;

}

.logo{

width:75px;
height:75px;
font-size:36px;

}

}

</style>

</head>

<body>

<div class="card" id="content">

<div class="logo">
💳
</div>

<h2>Pay Fees</h2>

<div class="subtitle">
The PCB Point
</div>

<div class="amount-box">

<div class="amount-label">
Amount Payable
</div>

<div class="amount" id="amount">
₹0
</div>

</div>

<div class="row">
<div class="label">
To
</div>

<div class="value">
Pecemb Point Education Private Limited
</div>
</div>

<div class="row">
<div class="label">
Program
</div>

<div class="value" id="program"></div>
</div>

<div class="row">
<div class="label">
Payment Note
</div>

<div class="value" id="note"></div>
</div>

<div class="upi-box">

<input id="upiField" readonly>

<button onclick="copyUPI()">
Copy
</button>

</div>

<div class="qr">
<img id="qrImage">
</div>

<button class="pay-btn" onclick="payNow()">
🚀 Pay via UPI
</button>

<div class="footer">

Google Pay • PhonePe • Paytm • BHIM

</div>

</div>

<div id="error">

Invalid Payment Link

</div>

<script>

const UPI_ID="9599582389-3@ybl";

const BUSINESS_NAME="Pecemb Point Education Private Limited";

const params=new URLSearchParams(window.location.search);

const amount=params.get("amount");

const program=params.get("program");

const note=params.get("note") || `${program} Fees`;

if(!amount || !program || Number(amount)<=0){

document.getElementById("content").style.display="none";

document.getElementById("error").style.display="block";

}else{

document.getElementById("amount").innerHTML=
"₹"+Number(amount).toLocaleString("en-IN");

document.getElementById("program").textContent=program;

document.getElementById("note").textContent=note;

document.getElementById("upiField").value=UPI_ID;

const upi=`upi://pay?pa=${UPI_ID}&pn=${encodeURIComponent(BUSINESS_NAME)}&am=${amount}&cu=INR&tn=${encodeURIComponent(note)}`;

document.getElementById("qrImage").src=
"https://api.qrserver.com/v1/create-qr-code/?size=250x250&data="+encodeURIComponent(upi);

}

function copyUPI(){

navigator.clipboard.writeText(UPI_ID);

alert("UPI ID Copied");

}

function payNow(){

const upi=`upi://pay?pa=${UPI_ID}&pn=${encodeURIComponent(BUSINESS_NAME)}&am=${amount}&cu=INR&tn=${encodeURIComponent(note)}`;

window.location.href=upi;

}

</script>

</body>
</html>
