<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Pay Fees | The PCB Point</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{

min-height:100vh;

display:flex;
justify-content:center;
align-items:center;

background:linear-gradient(-45deg,#4f46e5,#2563eb,#06b6d4,#10b981);
background-size:400% 400%;
animation:bg 12s ease infinite;

padding:20px;

}

@keyframes bg{

0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}

}

.card{

width:100%;
max-width:450px;

background:rgba(255,255,255,.15);

backdrop-filter:blur(18px);

border:1px solid rgba(255,255,255,.25);

border-radius:25px;

padding:35px;

box-shadow:0 20px 45px rgba(0,0,0,.25);

animation:fade .8s ease;

}

@keyframes fade{

from{
opacity:0;
transform:translateY(30px);
}

to{
opacity:1;
transform:none;
}

}

.logo{

width:80px;
height:80px;

margin:auto;

border-radius:50%;

background:#fff;

display:flex;
align-items:center;
justify-content:center;

font-size:38px;

box-shadow:0 10px 25px rgba(0,0,0,.15);

margin-bottom:20px;

}

h2{

text-align:center;
color:#fff;
font-weight:600;
margin-bottom:5px;

}

.brand{

text-align:center;
color:#eef;
margin-bottom:30px;
font-size:14px;

}

.row{

display:flex;
justify-content:space-between;
align-items:center;

padding:16px 0;

border-bottom:1px solid rgba(255,255,255,.15);

}

.label{

color:#dbeafe;
font-size:14px;

}

.value{

color:#fff;
font-weight:600;
text-align:right;

}

.amount{

font-size:32px;
color:#22c55e;
font-weight:700;

}

button{

margin-top:35px;

width:100%;

padding:18px;

border:none;

border-radius:16px;

font-size:18px;

font-weight:600;

cursor:pointer;

color:#fff;

background:linear-gradient(135deg,#16a34a,#22c55e);

transition:.3s;

box-shadow:0 12px 25px rgba(34,197,94,.45);

position:relative;

overflow:hidden;

}

button:hover{

transform:translateY(-3px);
box-shadow:0 18px 35px rgba(34,197,94,.6);

}

button:active{

transform:scale(.97);

}

button:before{

content:'';

position:absolute;

top:0;
left:-100%;

width:100%;
height:100%;

background:rgba(255,255,255,.3);

transform:skewX(-25deg);

animation:shine 2.2s infinite;

}

@keyframes shine{

100%{
left:150%;
}

}

.footer{

margin-top:20px;

text-align:center;

color:#eee;

font-size:12px;

}

#error{

display:none;

color:white;

font-size:22px;

text-align:center;

}

</style>

</head>

<body>

<div class="card" id="content">

<div class="logo">💳</div>

<h2>Pay Fees</h2>

<div class="brand">The PCB Point</div>

<div class="row">
<div class="label">Fees</div>
<div class="value amount" id="amount"></div>
</div>

<div class="row">
<div class="label">To</div>
<div class="value">
Pecemb Point Education Private Limited
</div>
</div>

<div class="row">
<div class="label">UPI ID</div>
<div class="value">
9599582389@paytm
</div>
</div>

<div class="row">
<div class="label">Note</div>
<div class="value" id="note"></div>
</div>

<button onclick="payNow()">
🚀 Pay via UPI
</button>

<div class="footer">

Supports Google Pay • PhonePe • Paytm • BHIM

</div>

</div>

<div id="error">

Invalid Payment Link

</div>

<script>

const UPI_ID="7428336492-1@okbizaxis";

const BRAND_NAME="The PCB Point";

const BUSINESS_NAME="Pecemb Point Education Private Limited";

const params=new URLSearchParams(window.location.search);

const program=params.get("program");

const amount=params.get("amount");

const note=params.get("note") || (program+" Fees");

if(!program || !amount){

document.getElementById("content").style.display="none";
document.getElementById("error").style.display="block";

}else{

document.getElementById("amount").innerHTML=
"₹"+Number(amount).toLocaleString("en-IN");

document.getElementById("note").textContent=note;

}

function payNow(){

const upi=
`upi://pay?pa=${encodeURIComponent(UPI_ID)}
&pn=${encodeURIComponent(BUSINESS_NAME)}
&am=${encodeURIComponent(amount)}
&cu=INR
&tn=${encodeURIComponent(note)}`.replace(/\n/g,'');

window.location.href=upi;

}

</script>

</body>
</html>
